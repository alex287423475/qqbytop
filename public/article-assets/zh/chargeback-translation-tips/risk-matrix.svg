<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">跨境电商chargeback申诉流程</title>
  <desc id="desc">跨境翻译: practical risk grading before quotation and delivery</desc>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="40" y="40" width="1120" height="600" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="80" y="105" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700" fill="#0f172a">跨境电商chargeback申诉流程</text>
  <text x="80" y="145" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#475569">跨境翻译: practical risk grading before quotation and delivery</text>
  
  <text x="350" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Urgency</text>
  <text x="74" y="390" transform="rotate(-90 74 390)" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Risk</text>
  
  <rect x="170" y="240" width="390" height="150" rx="14" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="198" y="288" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#166534">Low urgency / low risk</text>
  <foreignObject x="198" y="310" width="320" height="55">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;line-height:1.45;color:#334155">Basic reference translation</div>
  </foreignObject>

  <rect x="600" y="240" width="390" height="150" rx="14" fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  <text x="628" y="288" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#854d0e">High urgency / low risk</text>
  <foreignObject x="628" y="310" width="320" height="55">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;line-height:1.45;color:#334155">Fast delivery with format check</div>
  </foreignObject>

  <rect x="170" y="430" width="390" height="150" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="198" y="478" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">Low urgency / high risk</text>
  <foreignObject x="198" y="500" width="320" height="55">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;line-height:1.45;color:#334155">Expert review and term sheet</div>
  </foreignObject>

  <rect x="600" y="430" width="390" height="150" rx="14" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="628" y="478" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="23" font-weight="700" fill="#991b1b">High urgency / high risk</text>
  <foreignObject x="628" y="500" width="320" height="55">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,'Microsoft YaHei',sans-serif;font-size:16px;line-height:1.45;color:#334155">Manual confirmation before delivery</div>
  </foreignObject>
  <text x="170" y="590" font-family="Arial, sans-serif" font-size="15" fill="#64748b">Use this matrix to decide when human confirmation is required.</text>
</svg>
